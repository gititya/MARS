name: secret-scan

on:
  push:
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Scan source for hardcoded secrets
        run: |
          set -uo pipefail
          # High-signal patterns for real provider keys. Each requires a long
          # random suffix, so placeholders like ANTHROPIC_API_KEY do not match.
          patterns='sk-ant-[A-Za-z0-9_-]{20,}|sk-proj-[A-Za-z0-9_-]{20,}|sk-[A-Za-z0-9]{40,}|AIza[0-9A-Za-z_-]{35}|ghp_[A-Za-z0-9]{36}|xoxb-[A-Za-z0-9-]{12,}|AKIA[0-9A-Z]{16}|-----BEGIN [A-Z ]*PRIVATE KEY-----'
          # The workflow itself contains the patterns, so exclude .github from the scan.
          if git grep -nIE "$patterns" -- . ':!.github/'; then
            echo "::error::Potential hardcoded secret found above. Remove it and rotate the key."
            exit 1
          fi
          echo "No hardcoded secrets detected."
